# =============================================================================
# Build Pake Apps — GitHub Actions Workflow
# =============================================================================
# Gera apps desktop via Pake CLI para Windows, macOS e Linux a partir de uma
# config centralizada em config/apps.json.
#
# Disparo:
#   - Manual (workflow_dispatch) — permite escolher app específico
#   - Push na main com mudanças em config/apps.json ou no próprio workflow
#
# Cache:
#   - Rust (~/.cargo, ~/.rustup) — persiste entre builds, acelera ~10min → ~5min
#   - npm global — pacotes do Pake CLI
#
# Saída:
#   - Windows: .msi .exe
#   - macOS:   .dmg .app .dmg
#   - Linux:   .deb .AppImage .rpm .pkg.tar.zst
#   - Todos:   *-binary (standalone, quando keep-binary=true)
# =============================================================================

name: Build Pake Apps

on:
  workflow_dispatch:
    inputs:
      app-name:
        description: 'App específico para build (vazio = todos)'
        required: false
        type: string
      skip-cache:
        description: 'Ignorar cache (útil se cache corrompido)'
        required: false
        default: false
        type: boolean

  push:
    branches: [master, main]
    paths:
      - 'config/apps.json'
      - '.github/workflows/build-apps.yml'

  pull_request:
    branches: [master, main]
    paths:
      - 'config/apps.json'
      - '.github/workflows/build-apps.yml'

env:
  PAKE_CACHE_KEY: pake-v1
  CARGO_TERM_COLOR: always

# ── Jobs ────────────────────────────────────────────────────────────────────
jobs:

  # ── Job 1: Config ─────────────────────────────────────────────────────────
  # Lê config/apps.json, filtra se app específico foi solicitado, e gera a
  # matrix que o job build vai consumir.
  config:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.generate-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - id: generate-matrix
        name: Gerar matrix de apps
        run: |
          APPS=$(cat config/apps.json | jq -c '.apps')
          if [ -n "${{ inputs.app-name }}" ]; then
            APPS=$(echo "$APPS" | jq -c \
              '[.[] | select(.name == "${{ inputs.app-name }}")]')
            COUNT=$(echo "$APPS" | jq 'length')
            if [ "$COUNT" -eq 0 ]; then
              echo "ERRO: App '${{ inputs.app-name }}' não encontrado em config/apps.json"
              exit 1
            fi
          fi
          echo "matrix=$APPS" >> $GITHUB_OUTPUT

  # ── Job 2: Build ──────────────────────────────────────────────────────────
  # Matrix sobre 3 SOs × N apps — cada combinação gera um artefato separado.
  build:
    needs: config
    strategy:
      fail-fast: false          # se um SO falhar, os outros continuam
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        app: ${{ fromJson(needs.config.outputs.matrix) }}

    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    steps:
      # ── Setup ────────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ── Cache ─────────────────────────────────────────────────────────────
      - name: Cache Rust toolchain
        if: ${{ !inputs.skip-cache }}
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo
            ~/.rustup
          key: ${{ env.PAKE_CACHE_KEY }}-rust-${{ matrix.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ env.PAKE_CACHE_KEY }}-rust-${{ matrix.os }}-
            ${{ env.PAKE_CACHE_KEY }}-rust-

      - name: Cache pake-cli global
        if: ${{ !inputs.skip-cache }}
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm-global
            /usr/local/lib/node_modules
          key: ${{ env.PAKE_CACHE_KEY }}-npm-${{ matrix.os }}

      # ── Instalação ────────────────────────────────────────────────────────
      - name: Install Rust toolchain (Linux)
        if: runner.os == 'Linux'
        run: |
          # Pake requires Rust >= 1.85.0 (edition2024). apt provides 1.75 - too old.
          # Use rustup but set CARGO_HOME to a fresh temp dir to avoid stale
          # cross-platform cache conflict from macOS runners.
          export CARGO_HOME="$HOME/.cargo-fresh"
          export RUSTUP_HOME="$HOME/.rustup-fresh"
          mkdir -p "$CARGO_HOME/bin"
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --no-modify-path --default-toolchain stable 2>&1
          export PATH="$CARGO_HOME/bin:$PATH"
          echo "$CARGO_HOME/bin" >> $GITHUB_PATH
          echo "CARGO_HOME=$CARGO_HOME" >> $GITHUB_ENV
          echo "RUSTUP_HOME=$RUSTUP_HOME" >> $GITHUB_ENV
          rustc --version
          cargo --version
        shell: bash

      - name: Install Linux system deps (WebKit/Tauri)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libdbus-1-dev \
            libxdo-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libglib2.0-dev \
            pkg-config
        shell: bash

      - name: Install Rust toolchain (macOS)
        if: runner.os == 'macOS'
        run: |
          if ! command -v rustc &> /dev/null; then
            mkdir -p "$HOME/.cargo/bin"
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          fi
          rustc --version
          cargo --version
        shell: bash

      - name: Install pake-cli
        run: npm install -g pake-cli

      - name: Verify pake + Rust
        run: |
          pake --version
          rustc --version
          cargo --version
        shell: bash

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build ${{ matrix.app.name }} (${{ matrix.os }})
        shell: bash
        run: |
          set -euo pipefail

          # Usa array do bash para lidar com argumentos que contêm espaços
          ARGS=()

          [ -n "$WIDTH" ]       && ARGS+=(--width "$WIDTH")
          [ -n "$HEIGHT" ]      && ARGS+=(--height "$HEIGHT")
          [ -n "$ICON" ]        && ARGS+=(--icon "$ICON")
          [ -n "$SAFE_DOMAIN" ] && ARGS+=(--safe-domain "$SAFE_DOMAIN")
          [ -n "$USER_AGENT" ]  && ARGS+=(--user-agent "$USER_AGENT")
          [ -n "$TITLE" ]       && ARGS+=(--title "$TITLE")

          [ "$DARK_MODE" = "true" ]       && ARGS+=(--dark-mode)
          [ "$SYSTEM_TRAY" = "true" ]     && ARGS+=(--show-system-tray)
          [ "$MULTI_WINDOW" = "true" ]    && ARGS+=(--multi-window)
          [ "$INCOGNITO" = "true" ]       && ARGS+=(--incognito)
          [ "$WASM" = "true" ]            && ARGS+=(--wasm)
          [ "$DRAG_DROP" = "true" ]       && ARGS+=(--enable-drag-drop)
          [ "$FULLSCREEN" = "true" ]      && ARGS+=(--fullscreen)
          [ "$MAXIMIZE" = "true" ]        && ARGS+=(--maximize)
          [ "$ALWAYS_ON_TOP" = "true" ]   && ARGS+=(--always-on-top)
          [ "$DISABLED_WEB_SHORTCUTS" = "true" ] && ARGS+=(--disabled-web-shortcuts)
          [ "$ENABLE_FIND" = "true" ]     && ARGS+=(--enable-find)
          [ "$FORCE_INTERNAL_NAV" = "true" ] && ARGS+=(--force-internal-navigation)
          [ "$KEEP_BINARY" = "true" ]     && ARGS+=(--keep-binary)
          [ "$MULTI_INSTANCE" = "true" ]  && ARGS+=(--multi-instance)
          [ "$NEW_WINDOW" = "true" ]      && ARGS+=(--new-window)
          [ "$IGNORE_CERT" = "true" ]     && ARGS+=(--ignore-certificate-errors)

          # macOS-only
          [ "$CAMERA" = "true" ]          && ARGS+=(--camera)
          [ "$MICROPHONE" = "true" ]      && ARGS+=(--microphone)
          [ "$HIDE_TITLE_BAR" = "true" ]  && ARGS+=(--hide-title-bar)

          # hide-on-close: aceita true/false explícito
          if [ "$HIDE_ON_CLOSE" = "true" ]; then
            ARGS+=(--hide-on-close)
          elif [ "$HIDE_ON_CLOSE" = "false" ]; then
            ARGS+=(--hide-on-close false)
          fi

          # activation-shortcut
          [ -n "$ACTIVATION_SHORTCUT" ] && ARGS+=(--activation-shortcut "$ACTIVATION_SHORTCUT")

          # inject (CSS/JS locais)
          if [ -d "$GITHUB_WORKSPACE/config/inject" ]; then
            for f in "$GITHUB_WORKSPACE/config/inject"/*.css "$GITHUB_WORKSPACE/config/inject"/*.js; do
              [ -f "$f" ] && INJECT_LIST="${INJECT_LIST:+$INJECT_LIST,}$f"
            done
            [ -n "${INJECT_LIST:-}" ] && ARGS+=(--inject "$INJECT_LIST")
          fi

          echo "::group::Pake Build Command"
          echo "pake $URL --name \"$NAME\" ${ARGS[*]}"
          echo "::endgroup::"

          pake "$URL" --name "$NAME" "${ARGS[@]}"

        env:
          URL:                               ${{ matrix.app.url }}
          NAME:                              ${{ matrix.app.name }}
          WIDTH:                             ${{ matrix.app.width }}
          HEIGHT:                            ${{ matrix.app.height }}
          ICON:                              ${{ matrix.app.icon }}
          TITLE:                             ${{ matrix.app.title }}
          DARK_MODE:                         ${{ matrix.app.dark-mode }}
          SYSTEM_TRAY:                       ${{ matrix.app.show-system-tray }}
          HIDE_ON_CLOSE:                     ${{ matrix.app.hide-on-close }}
          MULTI_WINDOW:                      ${{ matrix.app.multi-window }}
          MULTI_INSTANCE:                    ${{ matrix.app.multi-instance }}
          INCOGNITO:                         ${{ matrix.app.incognito }}
          WASM:                              ${{ matrix.app.wasm }}
          DRAG_DROP:                         ${{ matrix.app.enable-drag-drop }}
          FULLSCREEN:                        ${{ matrix.app.fullscreen }}
          MAXIMIZE:                          ${{ matrix.app.maximize }}
          ALWAYS_ON_TOP:                     ${{ matrix.app.always-on-top }}
          SAFE_DOMAIN:                       ${{ matrix.app.safe-domain }}
          USER_AGENT:                        ${{ matrix.app.user-agent }}
          DISABLED_WEB_SHORTCUTS:            ${{ matrix.app.disabled-web-shortcuts }}
          ENABLE_FIND:                       ${{ matrix.app.enable-find }}
          FORCE_INTERNAL_NAV:                ${{ matrix.app.force-internal-navigation }}
          KEEP_BINARY:                       ${{ matrix.app.keep-binary }}
          NEW_WINDOW:                        ${{ matrix.app.new-window }}
          IGNORE_CERT:                       ${{ matrix.app.ignore-certificate-errors }}
          CAMERA:                            ${{ matrix.app.camera }}
          MICROPHONE:                        ${{ matrix.app.microphone }}
          HIDE_TITLE_BAR:                    ${{ matrix.app.hide-title-bar }}
          ACTIVATION_SHORTCUT:               ${{ matrix.app.activation-shortcut }}

      # ── Upload ────────────────────────────────────────────────────────────
      - name: Upload ${{ matrix.app.name }} (${{ matrix.os }})
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app.name }}-${{ matrix.os }}
          path: |
            *.msi
            *.exe
            *.dmg
            *.app
            *.deb
            *.AppImage
            *.rpm
            *.pkg.tar.zst
            *-binary
          if-no-files-found: warn
          retention-days: 30
